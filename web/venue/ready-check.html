<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Ready Check</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script><script src="/common/nav.js"></script></head><body><header><div class='container'><h1>Ready Check</h1><div class='nav'><a href='index.html'>Home</a><a href='ready-check.html'>Ready Check</a><a href='local-controls.html'>Local Controls</a><a href='screen-settings.html'>Screen Settings</a><a href='support.html'>Support</a></div></div></header><div class='container'><div class='panel'><div id='hdr'></div><div class='toolbar'><button id='readyYes' class='success'>Mark Ready</button><button id='readyNo' class='danger'>Mark Not Ready</button><button id='ackYes' class='primary'>Acknowledge Segment</button><button id='ackNo' class='warning'>Clear Acknowledgement</button><button id='battleReady' class='purple'>Battle Ready</button><button id='votingReady' class='purple'>Voting Ready</button></div></div></div><script>document.getElementById("menu").innerHTML = LinkdNNav.moderator(); const S=window.LinkdNShared;function vid(){return localStorage.getItem('venueNodeId')||'kc'} function render(){const st=S.loadState(),v=st.venueStates[vid()];hdr.innerHTML=`<h2>${S.venueName(vid())}</h2><div class='muted'>Current segment: ${st.currentSegment}</div><div class='pill'>Ready: ${v.workflow.ready?'Yes':'No'}</div><div class='pill'>Ack: ${v.workflow.acknowledged?'Yes':'No'}</div><div class='pill'>Battle Ready: ${v.workflow.battleReady?'Yes':'No'}</div><div class='pill'>Voting Ready: ${v.workflow.votingReady?'Yes':'No'}</div>`;} function set(k,val){const st=S.loadState();st.venueStates[vid()].workflow[k]=val;S.saveState(st);render();} readyYes.onclick=()=>set('ready',true); readyNo.onclick=()=>set('ready',false); ackYes.onclick=()=>set('acknowledged',true); ackNo.onclick=()=>set('acknowledged',false); battleReady.onclick=()=>set('battleReady',true); votingReady.onclick=()=>set('votingReady',true); window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()}); render();</script></body></html>
