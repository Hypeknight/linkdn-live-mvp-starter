<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Metrics - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="/common/ui.js"></script>
  <script src="/common/auth.js"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    LinkdNAuth.requireRole(["moderator"]);

    document.getElementById("app").innerHTML = LinkdNUI.dashboardShell("System Metrics", [
      { href: "/moderator/dashboard.html", label: "Dashboard" },
      { href: "/moderator/venues.html", label: "Venues" },
      { href: "/moderator/owners.html", label: "Owners & Staff" },
      { href: "/moderator/metrics.html", label: "Metrics" }
    ]);

    document.getElementById("page-content").innerHTML = `
      <div class="metric-grid">
        <div class="metric-card">
          <h3>Total Venues</h3>
          <div class="summary-value">6</div>
        </div>
        <div class="metric-card">
          <h3>Active Rooms</h3>
          <div class="summary-value">3</div>
        </div>
        <div class="metric-card">
          <h3>Polls Tonight</h3>
          <div class="summary-value">14</div>
        </div>
        <div class="metric-card">
          <h3>Total Votes</h3>
          <div class="summary-value">427</div>
        </div>
        <div class="metric-card">
          <h3>Issues Reported</h3>
          <div class="summary-value">5</div>
        </div>
        <div class="metric-card">
          <h3>Most Selected Game</h3>
          <div class="summary-value">City Battle</div>
        </div>
      </div>

      <div class="card" style="margin-top:24px;">
        <h3>Suggested next metrics</h3>
        <p>Venue readiness rate, average poll turnout, top city visits, support response time, and venue reliability score.</p>
      </div>
    `;
  </script>
</body>
</html>
