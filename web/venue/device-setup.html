<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Setup - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="/common/ui.js"></script>
  <script src="/common/auth.js"></script>
</head>
<body>
  <div id="app"></div>

  <script>
    LinkdNAuth.requireRole(["venue_owner", "venue_staff"]);

    document.getElementById("app").innerHTML = LinkdNUI.dashboardShell("Device Setup", [
      { href: "/venue/index.html", label: "Venue Home" },
      { href: "/venue/profile.html", label: "Venue Profile" },
      { href: "/venue/ready-check.html", label: "Ready Check" },
      { href: "/venue/local-controls.html", label: "Local Controls" },
      { href: "/venue/device-setup.html", label: "Device Setup" },
      { href: "/venue/screen-settings.html", label: "Screen Settings" },
      { href: "/venue/support.html", label: "Support" }
    ]);

    document.getElementById("page-content").innerHTML = `
      <div class="card">
        <h3>Device Configuration</h3>
        <p class="notice">Use this page before doors open to choose the correct camera, mic, and audio interface.</p>

        <div class="form-row" style="margin-top:14px;">
          <div>
            <label>Camera</label>
            <select id="cameraSelect"></select>
          </div>
          <div>
            <label>Microphone / Interface</label>
            <select id="audioSelect"></select>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="refreshDevicesBtn">Refresh Devices</button>
          <button type="button" id="saveDevicesBtn">Save Selection</button>
        </div>
      </div>

      <div class="feature-grid" style="margin-top:24px;">
        <div class="device-box">
          <h3>Selected Camera</h3>
          <div id="selectedCameraText">None selected</div>
        </div>
        <div class="device-box">
          <h3>Selected Audio</h3>
          <div id="selectedAudioText">None selected</div>
        </div>
        <div class="device-box">
          <h3>Next Step</h3>
          <div>After selecting devices, test them in Local Controls and Venue Screen.</div>
        </div>
      </div>
    `;

    async function loadDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameraSelect = document.getElementById("cameraSelect");
      const audioSelect = document.getElementById("audioSelect");

      const cameras = devices.filter(d => d.kind === "videoinput");
      const audios = devices.filter(d => d.kind === "audioinput");

      cameraSelect.innerHTML = cameras.map((d, i) => `
        <option value="${d.deviceId}">${d.label || `Camera ${i + 1}`}</option>
      `).join("");

      audioSelect.innerHTML = audios.map((d, i) => `
        <option value="${d.deviceId}">${d.label || `Audio Input ${i + 1}`}</option>
      `).join("");

      updateSelectedText();
    }

    function updateSelectedText() {
      const cameraSelect = document.getElementById("cameraSelect");
      const audioSelect = document.getElementById("audioSelect");

      document.getElementById("selectedCameraText").textContent =
        cameraSelect.options[cameraSelect.selectedIndex]?.text || "None selected";

      document.getElementById("selectedAudioText").textContent =
        audioSelect.options[audioSelect.selectedIndex]?.text || "None selected";
    }

    document.addEventListener("change", (e) => {
      if (e.target.id === "cameraSelect" || e.target.id === "audioSelect") {
        updateSelectedText();
      }
    });

    document.getElementById("refreshDevicesBtn").addEventListener("click", async () => {
      try {
        await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      } catch (err) {
        console.error(err);
      }
      loadDevices();
    });

    document.getElementById("saveDevicesBtn").addEventListener("click", () => {
      const config = {
        cameraId: document.getElementById("cameraSelect").value,
        audioId: document.getElementById("audioSelect").value,
        cameraName: document.getElementById("selectedCameraText").textContent,
        audioName: document.getElementById("selectedAudioText").textContent
      };
      localStorage.setItem("linkdn_device_setup", JSON.stringify(config));
      alert("Device selections saved.");
    });

    loadDevices();
  </script>
</body>
</html>
