<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Venues - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/config.js?v=live2"></script>
  <script src="/common/supabase.js?v=live2"></script>
  <script src="/common/auth-live.js?v=live2"></script>
  <script src="/common/nav.js?v=live2"></script>
</head>
<body>
  <div class="page-wrap">
    <div id="menu"></div>

    <div class="form-card">
      <h2>Add / Edit Venue</h2>
      <form id="venueForm">
        <input type="hidden" id="venue_id" />

        <label>Venue Name</label>
        <input id="name" required />

        <label style="margin-top:14px;">Street Address</label>
        <input id="street_address" />

        <div class="form-row" style="margin-top:14px;">
          <div>
            <label>City</label>
            <input id="city" />
          </div>
          <div>
            <label>State</label>
            <input id="state" maxlength="2" />
          </div>
        </div>

        <label style="margin-top:14px;">ZIP</label>
        <input id="zip" />

        <label style="margin-top:14px;">Status</label>
        <select id="active">
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>

        <div class="notice" style="margin-top:14px;">
          Slug is created automatically from venue name, city, and state.
        </div>

        <div class="form-actions">
          <button type="submit">Save Venue</button>
          <button type="button" id="resetBtn">Clear Form</button>
        </div>
      </form>

      <p id="status" class="notice" style="display:none;margin-top:14px;"></p>
    </div>

    <div class="table-wrap" style="margin-top:24px;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Address</th>
            <th>City/State</th>
            <th>ZIP</th>
            <th>Active</th>
            <th>Owner</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="venuesTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    document.getElementById("menu").innerHTML = LinkdNNav.moderator();

    function showStatus(message) {
      const el = document.getElementById("status");
      el.style.display = "block";
      el.textContent = message;
    }

    function clearForm() {
      document.getElementById("venue_id").value = "";
      document.getElementById("name").value = "";
      document.getElementById("street_address").value = "";
      document.getElementById("city").value = "";
      document.getElementById("state").value = "";
      document.getElementById("zip").value = "";
      document.getElementById("active").value = "true";
    }

    function makeSlug(name, city, state) {
      return [name, city, state]
        .filter(Boolean)
        .join("-")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .replace(/-{2,}/g, "-");
    }

    async function ensureModerator() {
      const profile = await LinkdNAuthLive.getProfile();
      if (!profile) {
        location.href = "/auth/login.html";
        return null;
      }
      if (profile.role !== "moderator") {
        alert("Moderator access only.");
        location.href = "/profile/index.html";
        return null;
      }
      return profile;
    }

    async function loadVenues() {
      const profile = await ensureModerator();
      if (!profile) return;

      const supabase = window.LinkdNSupabase.getClient();

      const { data, error } = await supabase
        .from("venues")
        .select(`
          id,
          name,
          slug,
          street_address,
          city,
          state,
          zip,
          active,
          owner_profile_id,
          profiles:owner_profile_id (
            display_name,
            email
          )
        `)
        .order("created_at", { ascending: false });

      if (error) {
        showStatus(error.message || "Could not load venues.");
        return;
      }

      const tbody = document.getElementById("venuesTable");
      tbody.innerHTML = "";

      if (!data || !data.length) {
        tbody.innerHTML = `<tr><td colspan="7">No venues found.</td></tr>`;
        return;
      }

      data.forEach((venue) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${venue.name || "-"}</td>
          <td>${venue.street_address || "-"}</td>
          <td>${[venue.city || "-", venue.state || "-"].join(", ")}</td>
          <td>${venue.zip || "-"}</td>
          <td>${venue.active ? "Yes" : "No"}</td>
          <td>${venue.profiles?.display_name || venue.profiles?.email || "-"}</td>
          <td>
            <button type="button" onclick='editVenue(${JSON.stringify(venue).replace(/'/g, "&apos;")})'>Edit</button>
            <button type="button" onclick="toggleVenue('${venue.id}', ${venue.active})">
              ${venue.active ? "Deactivate" : "Activate"}
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.editVenue = function(venue) {
      document.getElementById("venue_id").value = venue.id || "";
      document.getElementById("name").value = venue.name || "";
      document.getElementById("street_address").value = venue.street_address || "";
      document.getElementById("city").value = venue.city || "";
      document.getElementById("state").value = venue.state || "";
      document.getElementById("zip").value = venue.zip || "";
      document.getElementById("active").value = String(venue.active);
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.toggleVenue = async function(id, active) {
      const supabase = window.LinkdNSupabase.getClient();
      const { error } = await supabase
        .from("venues")
        .update({ active: !active })
        .eq("id", id);

      if (error) {
        showStatus(error.message || "Could not update venue.");
        return;
      }

      showStatus("Venue updated.");
      loadVenues();
    };

    document.getElementById("venueForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const profile = await ensureModerator();
      if (!profile) return;

      const supabase = window.LinkdNSupabase.getClient();

      const venueId = document.getElementById("venue_id").value.trim();
      const name = document.getElementById("name").value.trim();
      const city = document.getElementById("city").value.trim();
      const state = document.getElementById("state").value.trim().toUpperCase();

      const payload = {
        name,
        slug: makeSlug(name, city, state),
        street_address: document.getElementById("street_address").value.trim(),
        city,
        state,
        zip: document.getElementById("zip").value.trim(),
        active: document.getElementById("active").value === "true"
      };

      let result;
      if (venueId) {
        result = await supabase.from("venues").update(payload).eq("id", venueId);
      } else {
        result = await supabase.from("venues").insert(payload);
      }

      if (result.error) {
        showStatus(result.error.message || "Could not save venue.");
        return;
      }

      showStatus("Venue saved.");
      clearForm();
      loadVenues();
    });

    document.getElementById("resetBtn").addEventListener("click", clearForm);

    loadVenues();
  </script>
</body>
</html>
