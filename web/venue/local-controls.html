<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Controls - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/livekit-client/2.15.7/livekit-client.umd.js"></script>
  <script src="/common/config.js?v=live4"></script>
  <script src="/common/livekit.js?v=live4"></script>
  <script src="/common/nav.js?v=live4"></script>
</head>
<body>
  <div class="page-wrap">
    <div id="menu"></div>

    <div class="form-card">
      <h2>Local Controls</h2>
      <p id="status" class="notice">Ready.</p>

      <label>Room Name</label>
      <input id="roomName" value="central-battle-room" />

      <label style="margin-top:14px;">Identity</label>
      <input id="identity" value="venue-local-node" />

      <div class="form-actions">
        <button type="button" id="connectBtn">Connect</button>
        <button type="button" id="disconnectBtn">Disconnect</button>
      </div>

      <div class="form-actions" style="margin-top:16px;">
        <button type="button" id="camOnBtn">Camera On</button>
        <button type="button" id="camOffBtn">Camera Off</button>
        <button type="button" id="micOnBtn">Mic On</button>
        <button type="button" id="micOffBtn">Mic Off</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("menu").innerHTML = LinkdNNav.venue();
    const statusEl = document.getElementById("status");

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    document.getElementById("connectBtn").addEventListener("click", async () => {
      try {
        const roomName = document.getElementById("roomName").value.trim();
        const identity = document.getElementById("identity").value.trim();

        await LinkdNLiveKit.connect({
          roomName,
          identity,
          name: identity,
          metadata: JSON.stringify({ role: "venue_staff" })
        });

        await LinkdNLiveKit.applySavedDevices();
        await LinkdNLiveKit.enableCamera(true);
        await LinkdNLiveKit.enableMicrophone(true);

        setStatus("Connected and saved devices applied.");
      } catch (err) {
        setStatus(err.message || "Could not connect.");
      }
    });

    document.getElementById("disconnectBtn").addEventListener("click", async () => {
      await LinkdNLiveKit.disconnect();
      setStatus("Disconnected.");
    });

    document.getElementById("camOnBtn").addEventListener("click", async () => {
      try {
        await LinkdNLiveKit.enableCamera(true);
        setStatus("Camera on.");
      } catch (err) {
        setStatus(err.message || "Could not enable camera.");
      }
    });

    document.getElementById("camOffBtn").addEventListener("click", async () => {
      try {
        await LinkdNLiveKit.enableCamera(false);
        setStatus("Camera off.");
      } catch (err) {
        setStatus(err.message || "Could not disable camera.");
      }
    });

    document.getElementById("micOnBtn").addEventListener("click", async () => {
      try {
        await LinkdNLiveKit.enableMicrophone(true);
        setStatus("Microphone on.");
      } catch (err) {
        setStatus(err.message || "Could not enable mic.");
      }
    });

    document.getElementById("micOffBtn").addEventListener("click", async () => {
      try {
        await LinkdNLiveKit.enableMicrophone(false);
        setStatus(err.message || "Could not disable mic.");
      } catch (err) {
        setStatus(err.message || "Could not disable mic.");
      }
    });
  </script>
</body>
</html>
