<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Venue Screen</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script></head><body><div class='container'><div class='panel'><div class='hero'><div><h1 id='title'>Venue Screen</h1><div id='sub' class='muted'></div></div><div id='pillBar'></div></div><div class='grid grid-2' style='margin-top:20px'><div class='screenbox' id='feed'>No allowed feed selected</div><div class='panel'><div class='item'><div class='muted'>Current Segment</div><div id='seg' class='summary'></div></div><div class='item'><div class='muted'>Current Round</div><div id='rnd' class='summary'></div></div><div class='item'><div class='muted'>Judge Venue</div><div id='judge' class='summary'></div></div><div class='item'><div class='muted'>Battle Pair</div><div id='pair' class='summary'></div></div><div class='item'><div class='muted'>Winner</div><div id='winner' class='summary'></div></div></div></div><div class='status-banner' id='msg'></div><div class='nav'><a id='pollLink' href='#'>Open Patron Widget</a></div></div></div><script>const S=window.LinkdNShared;const params=new URLSearchParams(location.search);const vid=params.get('venue')||'kc';function render(){const st=S.loadState();const v=st.venueStates[vid];title.textContent=`${S.venueName(vid)} Venue Screen`;sub.textContent=`Output controlled by ${S.venueName(vid)} venue node`;pillBar.innerHTML=`<span class='pill'>${st.portalOpen?'Portal Open':'Portal Closed'}</span><span class='pill'>${st.currentRound}</span><span class='pill'>${st.currentSegment}</span>`;const sel=v.screen.selectedSourceVenue;const allowed=v.screen.allowedVisibleVenues||[];feed.textContent=(sel&&allowed.includes(sel))?`${S.venueName(sel)} Feed`:(sel&&!allowed.includes(sel)?'Blocked Feed':'No allowed feed selected');msg.textContent=(sel&&allowed.includes(sel))?`${S.venueName(vid)} is showing ${S.venueName(sel)}.`:'Choose an allowed feed from Screen Settings.';seg.textContent=st.currentSegment;rnd.textContent=st.currentRound;judge.textContent=S.venueName(st.judgeVenue);pair.textContent=`${S.venueName(st.battlePair[0])} vs ${S.venueName(st.battlePair[1])}`;winner.textContent=st.winner?S.venueName(st.winner):'Not announced';pollLink.href=`patron-widget.html?room=${st.activeRoomId}`;} window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()});render();</script></body></html>
