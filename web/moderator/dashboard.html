<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderator Dashboard - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/config.js?v=live1"></script>
  <script src="/common/supabase.js?v=live1"></script>
  <script src="/common/auth-live.js?v=live1"></script>
  <script src="/common/nav.js?v=live1"></script>
</head>
<body>
  <div class="page-wrap">
    <div id="menu"></div>

    <div class="feature-grid" style="margin-top:20px;">
      <div class="feature-card">
        <h3>Moderator</h3>
        <p><strong>Name:</strong> <span id="modName">Loading...</span></p>
        <p><strong>Email:</strong> <span id="modEmail">-</span></p>
        <p><strong>Role:</strong> <span id="modRole">-</span></p>
      </div>

      <div class="feature-card">
        <h3>Platform Snapshot</h3>
        <p><strong>Total Venues:</strong> <span id="venueCount">0</span></p>
        <p><strong>Total Rooms:</strong> <span id="roomCount">0</span></p>
        <p><strong>Total Profiles:</strong> <span id="profileCount">0</span></p>
      </div>

      <div class="feature-card">
        <h3>Quick Actions</h3>
        <div class="form-actions" style="flex-direction:column;">
          <a href="/moderator/venues.html"><button type="button">Manage Venues</button></a>
          <a href="/moderator/owners.html"><button type="button">Manage Owners & Staff</button></a>
          <a href="/moderator/metrics.html"><button type="button">View Metrics</button></a>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:24px;">
      <h3>System Notes</h3>
      <div id="systemNotes" class="notice">Loading system information...</div>
    </div>
  </div>

  <script>
    document.getElementById("menu").innerHTML = LinkdNNav.moderator();

    async function loadDashboard() {
      try {
        const profile = await LinkdNAuthLive.getProfile();
        if (!profile) return location.href = "/auth/login.html";
        if (profile.role !== "moderator") {
          alert("Moderator access only.");
          return location.href = "/profile/index.html";
        }

        document.getElementById("modName").textContent = profile.display_name || "-";
        document.getElementById("modEmail").textContent = profile.email || "-";
        document.getElementById("modRole").textContent = profile.role || "-";

        const supabase = window.LinkdNSupabase.getClient();

        const [{ count: venuesCount }, { count: roomsCount }, { count: profilesCount }] = await Promise.all([
          supabase.from("venues").select("*", { count: "exact", head: true }),
          supabase.from("rooms").select("*", { count: "exact", head: true }),
          supabase.from("profiles").select("*", { count: "exact", head: true })
        ]);

        document.getElementById("venueCount").textContent = venuesCount || 0;
        document.getElementById("roomCount").textContent = roomsCount || 0;
        document.getElementById("profileCount").textContent = profilesCount || 0;

        document.getElementById("systemNotes").textContent =
          "Moderator portal is connected to live Supabase data. Next expansions: room assignments, schedules, discipline flags, device health, and messaging.";
      } catch (err) {
        document.getElementById("systemNotes").textContent = err.message || "Could not load dashboard.";
      }
    }

    loadDashboard();
  </script>
</body>
</html>
