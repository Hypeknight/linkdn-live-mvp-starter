<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Moderator Rooms</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script></head><body><header><div class='container'><h1>Rooms</h1><div class='nav'><a href='index.html'>Home</a><a href='rooms.html'>Rooms</a><a href='schedules.html'>Schedules</a><a href='show-control.html'>Show Control</a><a href='venue-ops.html'>Venue Ops</a><a href='patron-pulse.html'>Patron Pulse</a></div></div></header><div class='container'><div class='grid grid-2'><div class='panel'><h2>Create / Update Room</h2><div class='grid grid-2'><input id='roomId' placeholder='Room ID'><input id='roomTitle' placeholder='Room Title'><textarea id='roomNotes' placeholder='Notes'></textarea><select id='roomVenues' multiple size='6'></select></div><div class='toolbar' style='margin-top:12px'><button id='createBtn' class='success'>Create</button><button id='updateBtn' class='primary'>Update Selected</button><button id='deleteBtn' class='danger'>Delete Selected</button></div></div><div class='panel'><h2>Room List</h2><div id='roomList' class='list'></div></div></div></div><script>const S=window.LinkdNShared;let selected=null;function opts(){return S.VENUES.map(v=>`<option value='${v.id}'>${v.name}</option>`).join('');}function render(){const st=S.loadState();document.getElementById('roomVenues').innerHTML=opts();document.getElementById('roomList').innerHTML=st.rooms.map(r=>`<div class='item ${selected===r.id?'active':''}'><strong>${r.title}</strong><br><span class='muted'>${r.id}</span><br><span class='muted'>${r.venues.map(S.venueName).join(', ')}</span><div class='row' style='margin-top:10px'><button class='primary' onclick='sel("${r.id}")'>Select</button><button class='success' onclick='act("${r.id}")'>Make Active</button></div></div>`).join(''); if(selected){const r=st.rooms.find(x=>x.id===selected); if(r){roomId.value=r.id;roomTitle.value=r.title;roomNotes.value=r.notes||'';[...roomVenues.options].forEach(o=>o.selected=r.venues.includes(o.value));}}}
window.sel=(id)=>{selected=id;render();}; window.act=(id)=>{const st=S.loadState();S.selectRoom(st,id);S.log(st,`Active room changed to ${id}`);S.saveState(st);selected=id;render();};
createBtn.onclick=()=>{const st=S.loadState();const id=roomId.value.trim(),title=roomTitle.value.trim(),notes=roomNotes.value.trim(),venues=[...roomVenues.selectedOptions].map(o=>o.value); if(!id||!title||venues.length<2)return; st.rooms.push({id,title,notes,venues}); st.schedules[id]=[]; S.log(st,`Room created: ${id}`); S.saveState(st); selected=id; render();};
updateBtn.onclick=()=>{const st=S.loadState();const r=st.rooms.find(x=>x.id===selected); if(!r)return; r.id=roomId.value.trim();r.title=roomTitle.value.trim();r.notes=roomNotes.value.trim();r.venues=[...roomVenues.selectedOptions].map(o=>o.value); S.log(st,`Room updated: ${r.id}`); S.saveState(st); selected=r.id; render();};
deleteBtn.onclick=()=>{const st=S.loadState(); if(!selected)return; st.rooms=st.rooms.filter(r=>r.id!==selected); delete st.schedules[selected]; if(st.activeRoomId===selected&&st.rooms[0]) S.selectRoom(st,st.rooms[0].id); S.log(st,`Room deleted: ${selected}`); S.saveState(st); selected=null; render();};window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()});render();</script></body></html>
