<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/config.js"></script>
  <script src="/common/supabase.js"></script>
  <script src="/common/auth-live.js"></script>
</head>
<body>

  <div class="page-wrap">
    <div class="form-card">
      <h2>Create account</h2>
      <form id="registerForm">
        <div class="form-row">
          <div>
            <label>Display name</label>
            <input name="display_name" required />
          </div>
          <div>
            <label>Email</label>
            <input type="email" name="email" required />
          </div>
        </div>
        <div class="form-row" style="margin-top:14px;">
          <div>
            <label>Password</label>
            <input type="password" name="password" required />
          </div>
          <div>
            <label>Role</label>
            <select name="role">
              <option value="venue_owner">Venue Owner</option>
              <option value="venue_staff">Venue Staff</option>
            </select>
          </div>
        </div>
        <div class="form-actions"><button type="submit">Register</button></div>
      </form>
      <p id="status" class="notice" style="display:none;margin-top:14px;"></p>
    </div>
  </div>
  <script>
    const form = document.getElementById("registerForm");
    const statusEl = document.getElementById("status");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.style.display = "none";
      try {
        const data = Object.fromEntries(new FormData(form).entries());
        const result = await LinkdNAuthLive.signUp(data);
        statusEl.style.display = "block";
        statusEl.textContent = result.session
          ? "Account created. Redirecting..."
          : "Account created. If email confirmation is on, check email and then log in.";
        if (result.session) setTimeout(() => location.href = "/profile/index.html", 900);
      } catch (err) {
        statusEl.style.display = "block";
        statusEl.textContent = err.message || "Registration failed.";
      }
    });
  </script>
</body>
</html>
