<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owners & Staff - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/config.js?v=live1"></script>
  <script src="/common/supabase.js?v=live1"></script>
  <script src="/common/auth-live.js?v=live1"></script>
  <script src="/common/nav.js?v=live1"></script>
</head>
<body>
  <div class="page-wrap">
    <div id="menu"></div>

    <div class="form-card">
      <h2>Create Owner / Staff Membership</h2>
      <form id="membershipForm">
        <label>User Email</label>
        <input id="email" type="email" required />

        <label style="margin-top:14px;">Display Name</label>
        <input id="display_name" required />

        <label style="margin-top:14px;">Role</label>
        <select id="role">
          <option value="venue_owner">Venue Owner</option>
          <option value="venue_staff">Venue Staff</option>
        </select>

        <label style="margin-top:14px;">Venue</label>
        <select id="venue_id"></select>

        <label style="margin-top:14px;">Access Level</label>
        <select id="access_level">
          <option value="owner">Owner</option>
          <option value="manager">Manager</option>
          <option value="operator">Operator</option>
        </select>

        <div class="form-actions">
          <button type="submit">Create Membership</button>
        </div>
      </form>
      <p id="status" class="notice" style="display:none;margin-top:14px;"></p>
      <div class="notice" style="margin-top:16px;">
        This page assumes the Auth user already exists in Supabase Authentication.
      </div>
    </div>

    <div class="table-wrap" style="margin-top:24px;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Venue</th>
            <th>Access</th>
            <th>Active</th>
          </tr>
        </thead>
        <tbody id="ownersTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    document.getElementById("menu").innerHTML = LinkdNNav.moderator();

    function showStatus(message) {
      const el = document.getElementById("status");
      el.style.display = "block";
      el.textContent = message;
    }

    async function ensureModerator() {
      const profile = await LinkdNAuthLive.getProfile();
      if (!profile) {
        location.href = "/auth/login.html";
        return null;
      }
      if (profile.role !== "moderator") {
        alert("Moderator access only.");
        location.href = "/profile/index.html";
        return null;
      }
      return profile;
    }

    async function loadVenuesForSelect() {
      const supabase = window.LinkdNSupabase.getClient();
      const { data, error } = await supabase
        .from("venues")
        .select("id, name")
        .eq("active", true)
        .order("name");

      const select = document.getElementById("venue_id");
      select.innerHTML = "";

      if (error || !data) return;

      data.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v.id;
        opt.textContent = v.name;
        select.appendChild(opt);
      });
    }

    async function loadMemberships() {
      const profile = await ensureModerator();
      if (!profile) return;

      const supabase = window.LinkdNSupabase.getClient();

      const { data, error } = await supabase
        .from("venue_members")
        .select(`
          id,
          access_level,
          active,
          profiles:profile_id (
            id,
            display_name,
            email,
            role
          ),
          venues:venue_id (
            id,
            name
          )
        `)
        .order("id", { ascending: false });

      if (error) {
        showStatus(error.message || "Could not load memberships.");
        return;
      }

      const tbody = document.getElementById("ownersTable");
      tbody.innerHTML = "";

      if (!data || !data.length) {
        tbody.innerHTML = `<tr><td colspan="6">No memberships found.</td></tr>`;
        return;
      }

      data.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.profiles?.display_name || "-"}</td>
          <td>${row.profiles?.email || "-"}</td>
          <td>${row.profiles?.role || "-"}</td>
          <td>${row.venues?.name || "-"}</td>
          <td>${row.access_level || "-"}</td>
          <td>${row.active ? "Yes" : "No"}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("membershipForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const profile = await ensureModerator();
      if (!profile) return;

      const supabase = window.LinkdNSupabase.getClient();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const displayName = document.getElementById("display_name").value.trim();
      const role = document.getElementById("role").value;
      const venueId = document.getElementById("venue_id").value;
      const accessLevel = document.getElementById("access_level").value;

      const { data: existingProfile, error: profileLookupError } = await supabase
        .from("profiles")
        .select("*")
        .eq("email", email)
        .single();

      if (profileLookupError || !existingProfile) {
        showStatus("That user must already exist in Supabase Authentication and profiles before assigning venue access.");
        return;
      }

      const { error: updateProfileError } = await supabase
        .from("profiles")
        .update({
          display_name: displayName,
          role
        })
        .eq("id", existingProfile.id);

      if (updateProfileError) {
        showStatus(updateProfileError.message || "Could not update profile.");
        return;
      }

      const { error: membershipError } = await supabase
        .from("venue_members")
        .upsert({
          venue_id: venueId,
          profile_id: existingProfile.id,
          access_level: accessLevel,
          active: true
        }, { onConflict: "venue_id,profile_id" });

      if (membershipError) {
        showStatus(membershipError.message || "Could not create membership.");
        return;
      }

      showStatus("Membership saved.");
      document.getElementById("membershipForm").reset();
      loadMemberships();
    });

    loadVenuesForSelect();
    loadMemberships();
  </script>
</body>
</html>
