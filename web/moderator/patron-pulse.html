<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Patron Pulse</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script><script src='../common/patron-pulse.js'></script></head><body><header><div class='container'><h1>Patron Pulse</h1><div class='nav'><a href='index.html'>Home</a><a href='rooms.html'>Rooms</a><a href='schedules.html'>Schedules</a><a href='show-control.html'>Show Control</a><a href='venue-ops.html'>Venue Ops</a><a href='patron-pulse.html'>Patron Pulse</a></div></div></header><div class='container'><div class='grid grid-2'><div class='panel'><h2>Create Poll</h2><select id='roomSel'></select><select id='type'><option value='next_city'>Next City</option><option value='next_game'>Next Game</option><option value='winner'>Winner</option></select><input id='question' value='Which city should we visit next?'><textarea id='options'>Miami
Atlanta
Dallas</textarea><input id='dur' type='number' value='60'><button id='openBtn' class='success'>Open Poll</button></div><div class='panel'><h2>Active Poll</h2><div id='meta' class='muted'></div><div id='results' class='list' style='margin-top:12px'></div><div class='toolbar' style='margin-top:12px'><button id='closeBtn' class='warning'>Close Poll</button><button id='approveBtn' class='success'>Approve Top Result</button><button id='clearBtn' class='danger'>Clear Active Poll</button></div><div class='status-banner' style='margin-top:12px'>Patron page: <code id='patronUrl'></code><br>Screen widget: <code id='widgetUrl'></code></div></div></div></div><script>const S=window.LinkdNShared;function rooms(){const st=S.loadState();roomSel.innerHTML=st.rooms.map(r=>`<option value='${r.id}'>${r.title}</option>`).join('');}function render(){rooms();const poll=PatronPulse.getActivePoll(roomSel.value);patronUrl.textContent=`../patron/index.html?room=${roomSel.value}`;widgetUrl.textContent=`../venue-screen/patron-widget.html?room=${roomSel.value}`;if(!poll){meta.textContent='No active poll';results.innerHTML='';return;}meta.textContent=`${poll.question} — ${poll.status}`;results.innerHTML=poll.options.map(o=>`<div class='item'><strong>${o.label}</strong><br><span class='muted'>Votes: ${o.votes}</span>${poll.winnerOption===o.id?`<br><span class='muted'>Approved winner</span>`:''}</div>`).join('');}
openBtn.onclick=()=>{const opts=options.value.split('\n').map(s=>s.trim()).filter(Boolean);PatronPulse.createPoll({roomId:roomSel.value,type:type.value,question:question.value.trim(),options:opts,durationSeconds:Number(dur.value)||60});render();};closeBtn.onclick=()=>{PatronPulse.closePoll(roomSel.value);render();};approveBtn.onclick=()=>{PatronPulse.approvePollResult(roomSel.value);render();};clearBtn.onclick=()=>{PatronPulse.clearActivePoll(roomSel.value);render();};roomSel.onchange=render;window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()});render();</script></body></html>
