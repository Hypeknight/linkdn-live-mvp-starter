<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Screen Settings</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script><script src="/common/nav.js"></script></head><body><header><div class='container'><h1>Screen Settings</h1><div class='nav'><a href='index.html'>Home</a><a href='ready-check.html'>Ready Check</a><a href='local-controls.html'>Local Controls</a><a href='screen-settings.html'>Screen Settings</a><a href='support.html'>Support</a></div></div></header><div class='container'><div class='panel'><h2>Allowed Feeds</h2><div class='grid grid-2'><div><select id='allowed' multiple size='6'></select></div><div><select id='selected'></select><div class='status-banner' id='rules'></div></div></div><div class='toolbar' style='margin-top:12px'><button id='saveAllowed' class='success'>Save Allowed Feeds</button><button id='applyVisible' class='primary'>Apply Selected Feed</button><button id='openScreen' class='primary'>Open Venue Screen</button></div></div></div><script>document.getElementById("menu").innerHTML = LinkdNNav.moderator();  const S=window.LinkdNShared;function vid(){return localStorage.getItem('venueNodeId')||'kc'} function render(){const st=S.loadState();const v=st.venueStates[vid()];allowed.innerHTML=S.VENUES.map(x=>`<option value='${x.id}'>${x.name}</option>`).join('');selected.innerHTML=`<option value=''>Choose feed</option>`+S.VENUES.map(x=>`<option value='${x.id}'>${x.name}</option>`).join('');[...allowed.options].forEach(o=>o.selected=v.screen.allowedVisibleVenues.includes(o.value));selected.value=v.screen.selectedSourceVenue||'';rules.innerHTML=`Allowed feeds for ${S.venueName(vid())}: <strong>${v.screen.allowedVisibleVenues.map(S.venueName).join(', ')||'None'}</strong><br>Current selected: <strong>${v.screen.selectedSourceVenue?S.venueName(v.screen.selectedSourceVenue):'None'}</strong>`;} saveAllowed.onclick=()=>{const st=S.loadState();st.venueStates[vid()].screen.allowedVisibleVenues=[...allowed.selectedOptions].map(o=>o.value);S.saveState(st);render();}; applyVisible.onclick=()=>{const st=S.loadState();const v=st.venueStates[vid()];const src=selected.value;if(!src)return;if(!v.screen.allowedVisibleVenues.includes(src)){rules.innerHTML='Selected source is not allowed for this venue.';return;} v.screen.selectedSourceVenue=src;S.saveState(st);render();}; openScreen.onclick=()=>window.open(`../venue-screen/index.html?venue=${vid()}`,'_blank'); window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()}); render();</script></body></html>
