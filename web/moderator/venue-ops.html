<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Venue Ops</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script></head><body><header><div class='container'><h1>Venue Operations</h1><div class='nav'><a href='index.html'>Home</a><a href='rooms.html'>Rooms</a><a href='schedules.html'>Schedules</a><a href='show-control.html'>Show Control</a><a href='venue-ops.html'>Venue Ops</a><a href='patron-pulse.html'>Patron Pulse</a></div></div></header><div class='container'><div class='panel'><h2>Venue Board</h2><div id='grid' class='grid grid-3'></div></div></div><script>const S=window.LinkdNShared;function render(){const st=S.loadState();grid.innerHTML=S.VENUES.map(v=>{const x=st.venueStates[v.id];return `<div class='item'><strong>${v.name}</strong><br><span class='muted'>Ready: ${x.workflow.ready?'Yes':'No'} | Ack: ${x.workflow.acknowledged?'Yes':'No'}</span><br><span class='muted'>Cam: ${x.localControls.cameraOn?'On':'Off'} | Mic: ${x.localControls.micOn?'On':'Off'} | DJ: ${x.localControls.djReady?'Ready':'No'}</span><br><span class='muted'>Issue: ${x.workflow.issue||'None'}</span><div class='toolbar' style='margin-top:10px'><button class='warning' onclick='tog("${v.id}","mutedByModerator")'>${x.networkStatus.mutedByModerator?'Unmute':'Mute'}</button><button class='danger' onclick='tog("${v.id}","cutByModerator")'>${x.networkStatus.cutByModerator?'Restore':'Cut'}</button><button class='primary' onclick='tog("${v.id}","spotlighted")'>${x.networkStatus.spotlighted?'Unspotlight':'Spotlight'}</button></div></div>`;}).join('');}
window.tog=(id,key)=>{const st=S.loadState();st.venueStates[id].networkStatus[key]=!st.venueStates[id].networkStatus[key];S.log(st,`${S.venueName(id)} ${key} toggled.`);S.saveState(st);render();}; window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()});render();</script></body></html>
