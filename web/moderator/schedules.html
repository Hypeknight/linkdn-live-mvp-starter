<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Moderator Schedules</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script></head><body><header><div class='container'><h1>Schedules</h1><div class='nav'><a href='index.html'>Home</a><a href='rooms.html'>Rooms</a><a href='schedules.html'>Schedules</a><a href='show-control.html'>Show Control</a><a href='venue-ops.html'>Venue Ops</a><a href='patron-pulse.html'>Patron Pulse</a></div></div></header><div class='container'><div class='grid grid-2'><div class='panel'><h2>Edit Schedule</h2><select id='roomSel'></select><div class='grid grid-2' style='margin-top:12px'><input id='time' value='11:30 PM'><input id='title' value='Portal Open'><select id='type'><option>Portal Open</option><option>DJ Swap</option><option>City Battle</option><option>Bottle Wars</option><option>Judge Panel</option><option>Winner Announcement</option><option>Portal Close</option></select><textarea id='desc'>All venues appear on the network.</textarea></div><div class='toolbar' style='margin-top:12px'><button id='addBtn' class='success'>Add</button><button id='updBtn' class='primary'>Update Selected</button><button id='delBtn' class='danger'>Delete Selected</button></div></div><div class='panel'><h2>Schedule Items</h2><div id='list' class='list'></div></div></div></div><script>const S=window.LinkdNShared;let selected=null;function render(){const st=S.loadState();roomSel.innerHTML=st.rooms.map(r=>`<option value='${r.id}'>${r.title}</option>`).join('');roomSel.value=st.selectedRoomId||st.activeRoomId;const items=st.schedules[roomSel.value]||[];list.innerHTML=items.map(i=>`<div class='item ${selected===i.id?'active':''}'><strong>${i.time} — ${i.title}</strong><br><span class='muted'>${i.type}</span><br><span class='muted'>${i.desc}</span><div class='row' style='margin-top:10px'><button class='primary' onclick='sel("${i.id}")'>Select</button><button class='success' onclick='runItem("${i.id}")'>Run</button></div></div>`).join('')||`<div class='item muted'>No schedule items.</div>`; if(selected){const it=items.find(x=>x.id===selected); if(it){time.value=it.time; title.value=it.title; type.value=it.type; desc.value=it.desc;}}}
window.sel=(id)=>{selected=id;render();}; window.runItem=(id)=>{const st=S.loadState();const it=(st.schedules[roomSel.value]||[]).find(x=>x.id===id); if(!it)return; st.currentSegment=it.title; st.eventType=it.type; S.log(st,`Ran schedule item: ${it.title}`); S.saveState(st);};
addBtn.onclick=()=>{const st=S.loadState();const rid=roomSel.value; const item={id:'sch_'+Date.now(),time:time.value.trim(),title:title.value.trim(),type:type.value,desc:desc.value.trim()}; (st.schedules[rid] ||= []).push(item); st.selectedRoomId=rid; S.log(st,`Schedule item added to ${rid}: ${item.title}`); S.saveState(st); selected=item.id; render();};
updBtn.onclick=()=>{const st=S.loadState();const items=st.schedules[roomSel.value]||[];const it=items.find(x=>x.id===selected); if(!it)return; it.time=time.value.trim();it.title=title.value.trim();it.type=type.value;it.desc=desc.value.trim();S.log(st,`Schedule item updated: ${it.title}`);S.saveState(st);render();};
delBtn.onclick=()=>{const st=S.loadState();st.schedules[roomSel.value]=(st.schedules[roomSel.value]||[]).filter(x=>x.id!==selected);S.log(st,'Schedule item deleted.');S.saveState(st);selected=null;render();}; roomSel.onchange=()=>{selected=null;render();}; window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()}); render();</script></body></html>
