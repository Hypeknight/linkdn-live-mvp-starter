<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Show Control</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script><script src='../common/patron-pulse.js'></script></head><body><header><div class='container'><h1>Show Control</h1><div class='nav'><a href='index.html'>Home</a><a href='rooms.html'>Rooms</a><a href='schedules.html'>Schedules</a><a href='show-control.html'>Show Control</a><a href='venue-ops.html'>Venue Ops</a><a href='patron-pulse.html'>Patron Pulse</a></div></div></header><div class='container'><div class='grid grid-2'><div><div class='panel'><h2>Core Controls</h2><div class='grid grid-4'><select id='roomSel'></select><select id='roundSel'><option>Round 1</option><option>Round 2</option><option>Final Round</option></select><select id='judgeSel'></select><select id='pairSel'></select></div><div class='toolbar' style='margin-top:12px'><button id='openPortal' class='success'>Open Portal</button><button id='closePortal' class='danger'>Close Portal</button><button id='startTimer' class='primary'>Start Timer</button><button id='stopTimer' class='warning'>Stop Timer</button><button id='resetTimer' class='danger'>Reset Timer</button><button id='advance' class='primary'>Advance Schedule</button></div><div class='toolbar' style='margin-top:12px'><button id='djSwap' class='primary'>DJ Swap</button><button id='bottle' class='warning'>Bottle Wars</button><button id='battle' class='purple'>City Battle</button><button id='judgePanel' class='purple'>Judge Panel</button><button id='announce' class='success'>Announce Winner</button><button id='rotateJudge' class='purple'>Rotate Judge</button></div></div><div class='panel'><h2>Live State</h2><div id='live' class='grid grid-4'></div></div></div><div><div class='panel'><h2>Patron Pulse Integration</h2><div class='muted'>Quick-start a poll from show control.</div><div class='toolbar' style='margin-top:12px'><button id='pollCity' class='primary'>Open “Next City” Poll</button><button id='pollGame' class='primary'>Open “Next Game” Poll</button><button id='pollWinner' class='primary'>Open “Winner” Poll</button></div><div id='pollInfo' class='status-banner'></div></div><div class='panel'><h2>Active Schedule</h2><div id='sched' class='list'></div></div></div></div></div><script>const S=window.LinkdNShared;let timerInt=null;function render(){const st=S.loadState();roomSel.innerHTML=st.rooms.map(r=>`<option value='${r.id}'>${r.title}</option>`).join('');roomSel.value=st.activeRoomId;roundSel.value=st.currentRound;const room=S.currentRoom(st);judgeSel.innerHTML=(room?.venues||[]).map(v=>`<option value='${v}'>${S.venueName(v)}</option>`).join('');judgeSel.value=st.judgeVenue;const pairs=S.pairsForRoom(room);pairSel.innerHTML=pairs.map(p=>`<option value='${p[0]}-${p[1]}'>${S.venueName(p[0])} vs ${S.venueName(p[1])}</option>`).join('');pairSel.value=`${st.battlePair[0]}-${st.battlePair[1]}`;live.innerHTML=`<div class='item'><div class='muted'>Room</div><div class='summary'>${st.activeRoomId}</div></div><div class='item'><div class='muted'>Segment</div><div class='summary'>${st.currentSegment}</div></div><div class='item'><div class='muted'>Timer</div><div class='summary'>${st.remainingTime}s</div></div><div class='item'><div class='muted'>Winner</div><div class='summary'>${st.winner?S.venueName(st.winner):'—'}</div></div>`;const items=st.schedules[st.activeRoomId]||[];sched.innerHTML=items.map(it=>`<div class='item ${it.title===st.currentSegment?'active':''}'><strong>${it.time} — ${it.title}</strong><br><span class='muted'>${it.desc}</span></div>`).join('')||`<div class='item muted'>No schedule</div>`;const poll=PatronPulse.getActivePoll(st.activeRoomId);pollInfo.innerHTML=poll?`Active poll: <strong>${poll.question}</strong> (${poll.status})`:'No active Patron Pulse poll.';}
function save(st){S.saveState(st);render();}
function startTimer(){const st=S.loadState();if(timerInt)clearInterval(timerInt);st.timerRunning=true;S.log(st,'Timer started.');save(st);timerInt=setInterval(()=>{const x=S.loadState();if(x.remainingTime>0){x.remainingTime--;S.saveState(x);render();}else{clearInterval(timerInt);x.timerRunning=false;S.log(x,'Timer completed.');S.saveState(x);render();}},1000);} 
roomSel.onchange=e=>{const st=S.loadState();S.selectRoom(st,e.target.value);S.log(st,`Active room changed to ${e.target.value}`);save(st);};roundSel.onchange=e=>{const st=S.loadState();st.currentRound=e.target.value;save(st);};judgeSel.onchange=e=>{const st=S.loadState();st.judgeVenue=e.target.value;save(st);};pairSel.onchange=e=>{const st=S.loadState();const[a,b]=e.target.value.split('-');st.battlePair=[a,b];save(st);};
openPortal.onclick=()=>{const st=S.loadState();st.portalOpen=true;st.currentSegment='Portal Open';S.log(st,'Portal opened.');save(st);};closePortal.onclick=()=>{const st=S.loadState();st.portalOpen=false;st.currentSegment='Portal Close';S.log(st,'Portal closed.');save(st);};startTimer.onclick=startTimer;stopTimer.onclick=()=>{if(timerInt)clearInterval(timerInt);const st=S.loadState();st.timerRunning=false;S.log(st,'Timer stopped.');save(st);};resetTimer.onclick=()=>{if(timerInt)clearInterval(timerInt);const st=S.loadState();st.timerRunning=false;st.remainingTime=60;S.log(st,'Timer reset.');save(st);};advance.onclick=()=>{const st=S.loadState();const arr=st.schedules[st.activeRoomId]||[];const idx=arr.findIndex(i=>i.title===st.currentSegment);const n=arr[idx+1]||arr[0];if(n){st.currentSegment=n.title;st.eventType=n.type;S.log(st,`Advanced to ${n.title}`);save(st);}};
djSwap.onclick=()=>{const st=S.loadState();st.currentSegment='DJ Swap';st.eventType='DJ Swap';save(st);};bottle.onclick=()=>{const st=S.loadState();st.currentSegment='Bottle Wars';st.eventType='Bottle Wars';save(st);};battle.onclick=()=>{const st=S.loadState();st.currentSegment='City Battle';st.eventType='City Battle';save(st);};judgePanel.onclick=()=>{const st=S.loadState();st.currentSegment='Judge Panel';save(st);};announce.onclick=()=>{const st=S.loadState();st.currentSegment='Winner Announcement';st.winner=st.battlePair[0];save(st);};rotateJudge.onclick=()=>{const st=S.loadState();const room=S.currentRoom(st);if(!room)return;const idx=room.venues.indexOf(st.judgeVenue);st.judgeVenue=room.venues[(idx+1)%room.venues.length];save(st);};
pollCity.onclick=()=>{const st=S.loadState(); const opts=(S.currentRoom(st).venues.filter(v=>v!==st.judgeVenue).map(v=>S.venueName(v))).concat(['Dallas']).slice(0,3); PatronPulse.createPoll({roomId:st.activeRoomId,type:'next_city',question:'Which city should we visit next?',options:opts,durationSeconds:60}); render();};
pollGame.onclick=()=>{const st=S.loadState(); PatronPulse.createPoll({roomId:st.activeRoomId,type:'next_game',question:'What should the venue play next?',options:['DJ Swap','Bottle Wars','City Battle'],durationSeconds:60}); render();};
pollWinner.onclick=()=>{const st=S.loadState(); PatronPulse.createPoll({roomId:st.activeRoomId,type:'winner',question:'Who won this round?',options:[S.venueName(st.battlePair[0]),S.venueName(st.battlePair[1])],durationSeconds:60}); render();};
window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()});render();</script></body></html>
