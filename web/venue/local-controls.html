<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Local Controls</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script><script src="/common/nav.js"></script></head><body><header><div class='container'><h1>Local Controls</h1><div class='nav'><a href='dashboard.html'>Home</a><a href='ready-check.html'>Ready Check</a><a href='local-controls.html'>Local Controls</a><a href='screen-settings.html'>Screen Settings</a><a href='support.html'>Support</a></div></div></header><div class='container'><div class='panel'><div id='info'></div><div class='toolbar'><button onclick="tog('cameraOn')" class='primary'>Toggle Camera</button><button onclick="tog('micOn')" class='primary'>Toggle Mic</button><button onclick="tog('djReady')" class='success'>Toggle DJ Ready</button><button onclick="tog('localPreviewReady')" class='success'>Toggle Preview Ready</button><button onclick="tog('selfMuted')" class='warning'>Emergency Mute</button><button onclick="tog('selfCut')" class='danger'>Emergency Cut</button></div></div></div><script>document.getElementById("menu").innerHTML = LinkdNNav.moderator();  const S=window.LinkdNShared;function vid(){return localStorage.getItem('venueNodeId')||'kc'} function render(){const st=S.loadState(),v=st.venueStates[vid()];info.innerHTML=`<h2>${S.venueName(vid())}</h2><div class='pill'>Camera ${v.localControls.cameraOn?'On':'Off'}</div><div class='pill'>Mic ${v.localControls.micOn?'On':'Off'}</div><div class='pill'>DJ ${v.localControls.djReady?'Ready':'Not Ready'}</div><div class='pill'>Preview ${v.localControls.localPreviewReady?'Ready':'Not Ready'}</div><div class='pill'>Self Muted ${v.localControls.selfMuted?'Yes':'No'}</div><div class='pill'>Self Cut ${v.localControls.selfCut?'Yes':'No'}</div>`;} window.tog=(k)=>{const st=S.loadState();st.venueStates[vid()].localControls[k]=!st.venueStates[vid()].localControls[k];S.saveState(st);render();}; window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()}); render();</script></body></html>
