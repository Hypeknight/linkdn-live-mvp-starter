<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metrics - Linkd'N</title>
  <link rel="stylesheet" href="/common/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/common/config.js?v=live1"></script>
  <script src="/common/supabase.js?v=live1"></script>
  <script src="/common/auth-live.js?v=live1"></script>
  <script src="/common/nav.js?v=live1"></script>
</head>
<body>
  <div class="page-wrap">
    <div id="menu"></div>

    <div class="metric-grid" style="margin-top:20px;">
      <div class="metric-card">
        <h3>Total Profiles</h3>
        <div class="summary-value" id="profilesCount">0</div>
      </div>
      <div class="metric-card">
        <h3>Total Venues</h3>
        <div class="summary-value" id="venuesCount">0</div>
      </div>
      <div class="metric-card">
        <h3>Total Rooms</h3>
        <div class="summary-value" id="roomsCount">0</div>
      </div>
      <div class="metric-card">
        <h3>Total Schedules</h3>
        <div class="summary-value" id="schedulesCount">0</div>
      </div>
      <div class="metric-card">
        <h3>Total Patron Polls</h3>
        <div class="summary-value" id="pollsCount">0</div>
      </div>
      <div class="metric-card">
        <h3>Total Votes</h3>
        <div class="summary-value" id="votesCount">0</div>
      </div>
    </div>

    <div class="card" style="margin-top:24px;">
      <h3>Platform Direction</h3>
      <p>
        Next metrics to track: live venue uptime, device readiness, issue frequency,
        room engagement, popular cities, game usage, and average poll turnout.
      </p>
    </div>
  </div>

  <script>
    document.getElementById("menu").innerHTML = LinkdNNav.moderator();

    async function loadMetrics() {
      const profile = await LinkdNAuthLive.getProfile();
      if (!profile) return location.href = "/auth/login.html";
      if (profile.role !== "moderator") {
        alert("Moderator access only.");
        return location.href = "/profile/index.html";
      }

      const supabase = window.LinkdNSupabase.getClient();

      const [
        { count: profilesCount },
        { count: venuesCount },
        { count: roomsCount },
        { count: schedulesCount },
        { count: pollsCount },
        { count: votesCount }
      ] = await Promise.all([
        supabase.from("profiles").select("*", { count: "exact", head: true }),
        supabase.from("venues").select("*", { count: "exact", head: true }),
        supabase.from("rooms").select("*", { count: "exact", head: true }),
        supabase.from("schedules").select("*", { count: "exact", head: true }),
        supabase.from("patron_polls").select("*", { count: "exact", head: true }),
        supabase.from("patron_votes").select("*", { count: "exact", head: true })
      ]);

      document.getElementById("profilesCount").textContent = profilesCount || 0;
      document.getElementById("venuesCount").textContent = venuesCount || 0;
      document.getElementById("roomsCount").textContent = roomsCount || 0;
      document.getElementById("schedulesCount").textContent = schedulesCount || 0;
      document.getElementById("pollsCount").textContent = pollsCount || 0;
      document.getElementById("votesCount").textContent = votesCount || 0;
    }

    loadMetrics();
  </script>
</body>
</html>
