<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Support</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script></head><body><header><div class='container'><h1>Support</h1><div class='nav'><a href='index.html'>Home</a><a href='ready-check.html'>Ready Check</a><a href='local-controls.html'>Local Controls</a><a href='screen-settings.html'>Screen Settings</a><a href='support.html'>Support</a></div></div></header><div class='container'><div class='panel'><textarea id='issue' placeholder='Describe issue'></textarea><div class='toolbar' style='margin-top:12px'><button id='submitIssue' class='warning'>Submit Issue</button><button id='clearIssue' class='danger'>Clear Issue</button><button id='requestHelp' class='primary'>Request Moderator Help</button><button id='clearHelp' class='success'>Clear Help Request</button></div><div id='state' class='status-banner'></div></div></div><script>const S=window.LinkdNShared;function vid(){return localStorage.getItem('venueNodeId')||'kc'} function render(){const st=S.loadState();const v=st.venueStates[vid()];issue.value=v.workflow.issue||'';state.innerHTML=`Help Requested: <strong>${v.workflow.helpRequested?'Yes':'No'}</strong><br>Issue: <strong>${v.workflow.issue||'None'}</strong>`;} submitIssue.onclick=()=>{const st=S.loadState();st.venueStates[vid()].workflow.issue=issue.value.trim();S.saveState(st);render();}; clearIssue.onclick=()=>{const st=S.loadState();st.venueStates[vid()].workflow.issue='';S.saveState(st);render();}; requestHelp.onclick=()=>{const st=S.loadState();st.venueStates[vid()].workflow.helpRequested=true;S.saveState(st);render();}; clearHelp.onclick=()=>{const st=S.loadState();st.venueStates[vid()].workflow.helpRequested=false;S.saveState(st);render();}; window.addEventListener('storage',e=>{if(e.key===S.STORAGE_KEY)render()}); render();</script></body></html>
