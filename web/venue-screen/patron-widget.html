<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Patron Widget</title><link rel='stylesheet' href='../common/app.css'><script src='../common/shared.js'></script><script src='../common/patron-pulse.js'></script></head><body><div class='container'><div class='panel'><h1>Patron Pulse Widget</h1><div id='room' class='muted'></div><div id='pills'></div><div id='question' class='summary' style='margin-top:20px'>No active vote</div><div id='opts' class='list' style='margin-top:20px'></div><div id='result' class='status-banner'></div></div></div><script>const params=new URLSearchParams(location.search);const roomId=params.get('room')||'central-battle-room';function render(){const poll=PatronPulse.getActivePoll(roomId);room.textContent=`Room: ${roomId}`; if(!poll){pills.innerHTML=`<span class='pill'>No active poll</span>`;question.textContent='No active vote';opts.innerHTML='';result.textContent='';return;} const rem=Math.max(0,Math.ceil((poll.closesAt-Date.now())/1000)); pills.innerHTML=`<span class='pill'>${poll.type}</span><span class='pill'>${poll.status}</span><span class='pill'>${poll.status==='open'?`Ends in ${rem}s`:'Voting closed'}</span>`; question.textContent=poll.question; opts.innerHTML=poll.options.map((o,i)=>`<div class='item'><strong>${String.fromCharCode(65+i)}. ${o.label}</strong><br><span class='muted'>Votes: ${o.votes}</span></div>`).join(''); if(poll.winnerOption){const w=poll.options.find(o=>o.id===poll.winnerOption); result.textContent=`Approved result: ${w? w.label: poll.winnerOption}`;} else result.textContent='Scan the QR code and vote now.';} setInterval(render,1000); window.addEventListener('storage',e=>{if(e.key===window.LinkdNShared.STORAGE_KEY)render()}); render();</script></body></html>
